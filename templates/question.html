<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Вопрос</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">  
</head>
<body>
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
        <div class="container-fluid">
            <!-- <a class="navbar-brand" href="#">Image</a> -->
            <img src="{{ url_for('static', filename='images/logo.png') }}" width="120" alt="Логотип сайта" class="me-3">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarScroll" aria-controls="navbarScroll" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarScroll">
            <ul class="navbar-nav me-auto my-2 my-lg-0 navbar-nav-scroll" style="--bs-scroll-height: 100px;">
                <li class="nav-item">
                <a class="nav-link active" aria-current="page" href="{{ url_for('home') }}">Главная</a>
                </li>
                <li class="nav-item">
                <a class="nav-link active" aria-current="page" href="{{ url_for('rating_page') }}">Рейтинг</a>
                </li>
            </ul>
           <div id="userSection">

           </div>
            </div>
        </div>
        </nav>

    </header>
    <main class="container mt-5">
         <div class="row justify-content-center">
            <div class="col-lg-8 col-md-10">
                <div id="loading" class="text-center">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Загрузка...</span>
                    </div>
                    <p class="mt-3">Загрузка вопроса...</p>
                </div>
                <div id="questionContainer" class="d-none">
                    <div class="card shadow-sm border-0">
                        <div class="card-body p-4">
                            <div class="text-center mb-4">
                                <span class="badge bg-info mb-2" id="categoryBadge">Категория</span>
                                <h2 class="card-title fw-bold text-primary" id="questionText">Текст вопроса..?</h2>
                                <p class="text-muted">Выберите наиболее предпочитаемый вариант</p>
                            </div>
                            <div class="options-container" id="optionsContainer">
                                <!-- Варианты ответа через javascript -->
                            </div>
                            <div class="text-center">
                                <a href="{{ url_for('home') }}">
                                    <button type="button" class="btn btn-dark btn-lg px-5" id="submitBtn" disable onclick="submitAnswer()">Ответить на вопрос</button>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <footer class="navbar-custom text-light py-3 mt-5">
        <div class="container">
            <div class="text-center">
                <p class="mb-0">&copy; 2024 Проект ученика МАОУ лицея №97 Герасимова Кирилла. Все права защищены.</p>
            </div>
        </div>
    </footer>
    <div class="toast-container">
        <div id="successToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="toast-header bg-success text-white">
                <strong class="me-auto">Успех!</strong>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
            <div class="toast-body">
                Ответ принят!
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            let currentQuestionId = null;
            let selectedAnswerId = null;
            async function checkAuthAndLoadQuestion() {
                try {
                    const authResponse = await fetch('/check_auth', {
                        headers: {"Content-Type": "application/json"},
                        credentials: 'include'
                    });

                    const authData = await authResponse.json();
                    const userSection = document.getElementById('userSection');
                    if (authData.authenticated) {
                        userSection.innerHTML = `
                            <span class="navbar-text me-3">Привет, ${authData.user.name}!</span>
                            <button class="btn btn-outline-light" onclick="logout()">Выйти</button>
                        `;
                    } else {
                        window.location.href = 'signin.html'
                    }
                } catch (error) {
                    // TODO: вывод ошибки
                }
            }

            async function loadQuestion(){
                showLoading(true);

                try {
                    const response = await fetch('http://127.0.0.1:5000/get_question', {
                        headers: {"Content-Type": "application/json"},
                        credentials: 'include'
                    });

                    console.log('Response status:', response.status);
                    console.log('Response headers:', [...response.headers.entries()]);

                    if (response.status === 401) {
                        alert('Сессия истекла. Пожалуйста, войдите снова.');
                        // window.location.href = 'signin.html';
                        return;
                    }

                    const data = await response.json();

                    if (response.ok) {
                        displayQuestion(data);
                    } else {
                        console.error('Ошибка при получении вопроса:', data.error || 'Неизвестная ошибка');
                        alert('Ошибка: ' + (data.error || 'Не удалось загрузить вопрос'));
                    }
                } catch (error) {
                    console.error('Сетевая ошибка:', error);
                    alert('Сетевая ошибка. Проверьте подключение к серверу.');
                } finally {
                    showLoading(false);
                }
            }

            
            function displayQuestion(data) {
                currentQuestionId = data.question.id;

                document.getElementById('questionText').textContent = data.question.text;
                document.getElementById('categoryBadge').textContent = data.question.category;

                const optionsContainer = document.getElementById('optionsContainer');
                optionsContainer.innerHTML = '';

                data.options.forEach((option, index) => {
                    console.log(option);
                    const optionId = `option${option.letter}`;
                    const optionElement = `
                        <div class="option-item mb-3">
                            <input type="radio" class="btn-check" name="options" id="${optionId}" autocomplete="off" value="${option.id}" onclick="">
                            <label class="btn btn-outline-secondary w-100 p-3 text-start d-flex align-items-center" for="${optionId}">
                                <span class="option-badge bg-secondary text-white rounded-circle d-flex align-items-center justify-content-center me-3" style="width: 30px; height: 30px;">${option.letter}</span>
                                <span>${option.text}</span>
                            </label>
                        </div>
                    `;
                    optionsContainer.innerHTML += optionElement;
                });

                selectedAnswerId = null;
                document.getElementById('submitBtn').disabled = true;
                document.getElementById('questionContainer').classList.remove('d-none');
            }

            function showLoading(show) {
                const loading = document.getElementById('loading');
                const questionContainer = document.getElementById('questionContainer');

                loading.classList.toggle('d-none', !show);
                if (!show) {
                    questionContainer.classList.remove('d-none');
                }
            }

            function selectAnswer(answerId, optionId) {
                selectedAnswerId = answerId;
                document.getElementById('submitBtn').disabled = false;

                // TODO: изменение классов (покраска элементов)
            }

            async function submitAnswer() {
                if (!selectedAnswerId || !currentQuestionId) {
                    alert('Выберите вариант ответа');
                    return;
                }

                try {
                    const response = await fetch('http://127.0.0.1:5000/submit_answer', {
                        method: "POST",
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        credentials: 'include',
                        body: JSON.stringify({
                            answer_id: selectedAnswerId,
                            questionId: currentQuestionId
                        })
                    });

                    const data = await response.json();
                    if (response.ok) {
                        // TODO: изменение классов (покраска элементов)
                        window.location.href = 'index.html';
                    } else {
                        alert('Ошибка: ' + data.error);
                    }
                } catch (error) {
                    alert('Ошибка сети: ' + error.message);
                }
            }

            // checkAuthAndLoadQuestion();
            loadQuestion();
        });
    </script>
</body>
</html>
