<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Авторизация</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">  
</head>
<body>
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
        <div class="container-fluid">
            <!-- <a class="navbar-brand" href="#">Image</a> -->
            <img src="{{ url_for('static', filename='images/logo.png') }}" width="120" alt="Логотип сайта" class="me-3">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarScroll" aria-controls="navbarScroll" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarScroll">
            <ul class="navbar-nav me-auto my-2 my-lg-0 navbar-nav-scroll" style="--bs-scroll-height: 100px;">
                <li class="nav-item">
                <a class="nav-link active" aria-current="page" href="{{ url_for('home') }}">Главная</a>
                </li>
                <li class="nav-item">
                <a class="nav-link active" aria-current="page" href="{{ url_for('rating_page') }}">Рейтинг</a>
                </li>
            </ul>
            <a href="{{ url_for('signup_page') }}"><button class="btn btn-outline-light" type="submit">Зарегистрироваться</button></a>
            </div>
        </div>
        </nav>

    </header>
    <main class="container mt-4">
        <div class="text-center">
            <h2> АВТОРИЗАЦИЯ </h2>
        </div>
        <div class="mb-3">
            <label for="exampleFormControlInput1" class="form-label">Логин</label>
            <input class="form-control" id="login" placeholder="Derector228">
        </div>
        <div class="mb-5">
            <label for="exampleFormControlInput1" class="form-label">Пароль</label>
            <input type="password" class="form-control" id="password" placeholder="**********">
        </div>
        <div class="text-center">
            <button id="submitButton" type="button" class="btn btn-dark ps-5 pe-5">Войти в аккаунт</button>
        </div>
    </main>
    <footer class="navbar-custom text-light py-3 mt-5">
        <div class="container">
            <div class="text-center">
                <p class="mb-0">&copy; 2024 Проект ученика МАОУ лицея №97 Герасимова Кирилла. Все права защищены.</p>
            </div>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
    <script>
    document.addEventListener('DOMContentLoaded', () => {
        let submitButton = document.getElementById('submitButton');
        submitButton.addEventListener('click', async () => {
            let login = document.getElementById('login').value;
            let password = document.getElementById('password').value;
            
            try {
                const res = await fetch("http://localhost:5000/signin", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Accept": "application/json"
                    },
                    credentials: "include",  // Это важно!
                    body: JSON.stringify({ login, password })
                });
                
                const data = await res.json();
                
                if (!res.ok) {
                    alert(data.error || "Ошибка авторизации");
                    return;
                }
                
                // Проверяем, установились ли куки
                console.log('Response headers:', res.headers.get('Set-Cookie'));
                
                // После успешного входа проверяем авторизацию
                const authCheck = await fetch("http://localhost:5000/check_auth", {
                    method: "GET",
                    credentials: "include"
                });
                
                const authData = await authCheck.json();
                console.log('Auth check:', authData);
                
                if (authData.authenticated) {
                    // window.location.href = "index.html";
                } else {
                    alert("Сессия не установилась. Проверьте консоль браузера.");
                }
                
            } catch (error) {
                console.error('Ошибка:', error);
                alert("Ошибка подключения к серверу");
            }
        });
    });
    </script>
</body>
</html>
