<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Регистрация</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">  
</head>
<body>
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
        <div class="container-fluid">
            <!-- <a class="navbar-brand" href="#">Image</a> -->
            <img src="{{ url_for('static', filename='images/logo.png') }}" width="120" alt="Логотип сайта" class="me-3">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarScroll" aria-controls="navbarScroll" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarScroll">
            <ul class="navbar-nav me-auto my-2 my-lg-0 navbar-nav-scroll" style="--bs-scroll-height: 100px;">
                <li class="nav-item">
                <a class="nav-link active" aria-current="page" href="{{ url_for('home') }}">Главная</a>
                </li>
                <li class="nav-item">
                <a class="nav-link active" aria-current="page" href="{{ url_for('rating_page') }}">Рейтинг</a>
                </li>
            </ul>
            <a href="{{ url_for('signin_page') }}"><button class="btn btn-outline-light" type="submit">Войти</button></a>
            </div>
        </div>
        </nav>

    </header>
    <main class="container mt-4">
        <div class="text-center">
            <h2> РЕГИСТРАЦИЯ </h2>
        </div>
        <div class="mb-3">
            <label for="exampleFormControlInput1" class="form-label">Логин</label>
            <input type="email" class="form-control" id="login" placeholder="Derector228">
        </div>
        <div class="mb-3">
            <label for="exampleFormControlInput1" class="form-label">Имя</label>
            <input type="email" class="form-control" id="name" placeholder="Миша">
        </div>
        <div class="mb-3">
            <label for="exampleFormControlInput1" class="form-label">Фамилия</label>
            <input type="email" class="form-control" id="surname" placeholder="Герасимов">
        </div>
        <select class="form-select form-select-sm mb-3" id="class" aria-label="Small select example">
            <option selected>Выберете класс</option>
            <option value="5">5</option>
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8">8</option>
            <option value="5">9</option>
            <option value="6">10</option>
            <option value="7">11</option>
            <option value="8">Учитель</option>
        </select>
        <div class="row g-3 align-items-center mb-3">
            <div class="col-auto">
                <label for="inputPassword6" class="col-form-label">Пароль</label>
            </div>
            <div class="col-auto">
                <input type="password" id="password" class="form-control" aria-describedby="passwordHelpInline">
            </div>
            <div class="col-auto">
                <span id="passwordHelpInline" class="form-text">
                Длина пароля должна составлять 8-20 символов.
                </span>
            </div>
        </div>
        <div class="row g-3 align-items-center mb-5">
            <div class="col-auto">
                <label for="inputPassword6" class="col-form-label">Подтверждение пароля</label>
            </div>
            <div class="col-auto">
                <input type="password" id="password2" class="form-control" aria-describedby="passwordHelpInline">
            </div>
            <div class="col-auto">
                <span id="passwordHelpInline" class="form-text">
                Длина пароля должна составлять 8-20 символов.
                </span>
            </div>
        </div>
        <div class="text-center">
            <button type="button" id="signupBtn" class="btn btn-dark">Зарегистрироваться</button>
        </div>
    </main>
    <footer class="navbar-custom text-light py-3 mt-5">
        <div class="container">
            <div class="text-center">
                <p class="mb-0">&copy; 2024 Проект ученика МАОУ лицея №97 Герасимова Кирилла. Все права защищены.</p>
            </div>
        </div>
    </footer>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
        let submitButton = document.getElementById('signupBtn');
        submitButton.addEventListener('click', async () => {
            let login = document.getElementById('login').value;
            let name = document.getElementById('name').value;
            let surname = document.getElementById('surname').value;
            let password = document.getElementById('password').value;
            let clss = document.getElementById('class').value;
            let password2 = document.getElementById('password2').value;
            if (password !== password2) {
                alert("пароли не равны");
                return;
            }
            const res = await fetch("http://127.0.0.1:5000/signup", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                credentials: "include",
                body: JSON.stringify({ login, name, surname, password, class: clss, password2})
            });
            const data = await res.json();
            if (!res.ok) {
                alert(data.error);
                return;
            }
            window.location.href = "signin.html";
        });
    });
    </script>  
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
</body>
</html>
